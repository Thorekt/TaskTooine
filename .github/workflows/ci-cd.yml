name: CI/CD

run-name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches: 
      - main
  
jobs:
  # Java tests using Maven and java 21
  tests-java:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tasktooine-api
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
      - name: Build and test with Maven
        run: mvn clean verify
      - name: Archive test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-reports
          path: tasktooine-api/target/surefire-reports/*.xml
      - name: Archive coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: jacoco-report
          path: tasktooine-api/target/site/jacoco/jacoco.xml

  # SonarQube code quality scan
  scan-sonarqube:
    runs-on: ubuntu-latest
    needs: [tests-java]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Build api (no tests)
        working-directory: tasktooine-api
        run: mvn -DskipTests package

      - name: Download Java test artifact
        uses: actions/download-artifact@v8
        with:
          name: test-reports
          path: tasktooine-api/target/surefire-reports

      - name: Download coverage artifact
        uses: actions/download-artifact@v8
        with:
          name: jacoco-report
          path: tasktooine-api/target/site/jacoco

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        with:
          args: >
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }}
            -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }}

            -Dsonar.sources=tasktooine-api/src/main
            -Dsonar.tests=tasktooine-api/src/test
            -Dsonar.java.binaries=tasktooine-api/target/classes
            -Dsonar.java.libraries=/home/runner/.m2/repository/**/*.jar

            -Dsonar.junit.reportPaths=tasktooine-api/target/surefire-reports
            -Dsonar.coverage.jacoco.xmlReportPaths=tasktooine-api/target/site/jacoco/jacoco.xml
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
