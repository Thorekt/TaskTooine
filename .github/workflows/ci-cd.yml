name: CI/CD

run-name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches: 
      - main
  
jobs:
  # Java tests using Maven and java 21
  tests-java:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: back
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Set up Java 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
      - name: Build and test with Maven
        run: mvn clean install
      - name: Archive test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: tasktooine-api/target/surefire-reports/*.xml

  # SonarQube code quality scan
  scan-sonarqube:
    runs-on: ubuntu-latest
    needs: [tests-java, tests-node]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Build api (no tests)
        working-directory: tasktooine-api
        run: mvn -DskipTests package

      - name: Download Java test artifact
        uses: actions/download-artifact@v4
        with:
          name: test-reports
          path: tasktooine-api/target/surefire-reports/*.xml

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v7
        with:
          args: >
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }}
            -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }}

            -Dsonar.sources=tasktooine-api/src
            -Dsonar.java.binaries=tasktooine-api/target/classes

            -Dsonar.junit.reportPaths=tasktooine-api/target/surefire-reports
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}